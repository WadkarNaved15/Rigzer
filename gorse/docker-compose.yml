services:

  # ------------------------------------------------------------
  # MASTER NODE
  # Handles: model training, pipeline coordination, dashboard
  # Dashboard: http://localhost:8088
  # ------------------------------------------------------------
  gorse-master:
    image: zhenghaoz/gorse-master:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8086:8086"
      - "8088:8088"
    volumes:
      - ./config.toml:/etc/gorse/config.toml:ro
      - gorse-blob:/var/lib/gorse
    environment:
      GORSE_DATA_STORE:          ${GORSE_DATA_STORE}
      GORSE_CACHE_STORE:         ${GORSE_CACHE_STORE}
      GORSE_MASTER_JOBS:         ${GORSE_MASTER_JOBS:-4}
      GORSE_DASHBOARD_USER_NAME: ${GORSE_DASHBOARD_USER_NAME}
      GORSE_DASHBOARD_PASSWORD:  ${GORSE_DASHBOARD_PASSWORD}
    command: -c /etc/gorse/config.toml
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ------------------------------------------------------------
  # SERVER NODE
  # Handles: REST API that your Node.js app calls
  # API: http://localhost:8087
  # ------------------------------------------------------------
  gorse-server:
    image: zhenghaoz/gorse-server:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8087:8087"
    environment:
      GORSE_DATA_STORE:     ${GORSE_DATA_STORE}
      GORSE_CACHE_STORE:    ${GORSE_CACHE_STORE}
      GORSE_SERVER_API_KEY: ${GORSE_SERVER_API_KEY}
    # Wait 15s for master gRPC to be fully ready before connecting
    entrypoint: ["/bin/sh", "-c", "sleep 15 && /usr/bin/gorse-server $$0 $$@"]
    command: >
      --master-host gorse-master
      --master-port 8086
      --http-host 0.0.0.0
    depends_on:
      gorse-master:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ------------------------------------------------------------
  # WORKER NODE
  # Handles: offline recommendation generation per user
  # ------------------------------------------------------------
  gorse-worker:
    image: zhenghaoz/gorse-worker:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      GORSE_DATA_STORE:  ${GORSE_DATA_STORE}
      GORSE_CACHE_STORE: ${GORSE_CACHE_STORE}
    # Wait 15s for master gRPC to be fully ready before connecting
    entrypoint: ["/bin/sh", "-c", "sleep 15 && /usr/bin/gorse-worker $$0 $$@"]
    command: >
      --master-host gorse-master
      --master-port 8086
      --jobs 4
    depends_on:
      gorse-master:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  gorse-blob: